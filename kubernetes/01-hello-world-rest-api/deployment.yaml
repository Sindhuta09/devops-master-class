apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-world-rest-api
  namespace: default
  labels:
    app: hello-world-rest-api

spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-world-rest-api

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%

  template:
    metadata:
      labels:
        app: hello-world-rest-api

    spec:
      containers:
      - name: hello-world-rest-api
        image: in28min/hello-world-rest-api:0.0.2.RELEASE
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: hello-world-rest-api
  namespace: default
  labels:
    app: hello-world-rest-api

spec:
  type: LoadBalancer
  selector:
    app: hello-world-rest-api

  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080